




<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>閱讀器測試</title>

<style>
body { font-family: sans-serif; background:#111; color:white; margin:0; }
#viewer { padding:20px; background:white; color:black; height:90vh; overflow:auto; }
button { padding:10px; margin:5px; }
</style>
</head>

<body>

<div style="text-align:center;">
  <button onclick="prev()">⬅</button>
  <button onclick="next()">➡</button>
</div>

<div id="viewer"></div>

<script>
const pages = [
  "📖 第1頁：這是測試書內容",
  "📖 第2頁：你現在的閱讀器已經可以翻頁",
  "📖 第3頁：代表功能是正常的",
  "📖 第4頁：下一步才是接 EPUB",
  "📖 第5頁：恭喜你成功"
];

let i = 0;

function render(){
  document.getElementById("viewer").innerText = pages[i];
}

function next(){
  if(i < pages.length - 1) i++;
  render();
}

function prev(){
  if(i > 0) i--;
  render();
}

render();
</script>

</body>
</html>
