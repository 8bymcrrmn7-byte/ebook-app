<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>電子書搜尋 App</title>

<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
}

#top{
  padding:10px;
  background:#222;
  color:white;
  text-align:center;
}

#searchBox{
  padding:10px;
}

input{
  width:70%;
  padding:10px;
}

button{
  padding:10px;
}

#viewer{
  height:80vh;
}
</style>
</head>

<body>

<div id="top">
📚 輸入書名自動閱讀
</div>

<div id="searchBox">
<input id="bookname" placeholder="輸入書名（例如 moby dick）">
<button onclick="loadBook()">搜尋/開書</button>
</div>

<div id="viewer"></div>

<script>

/* 📚 書庫對照表（重點） */
const bookDB = {
  "moby dick":"https://cdn.jsdelivr.net/gh/futurepress/epubjs-test-book/books/moby-dick.epub",
  "alice":"https://cdn.jsdelivr.net/gh/futurepress/epubjs-test-book/books/alice.epub",
  "pride":"https://standardebooks.org/ebooks/jane-austen/pride-and-prejudice/downloads/jane-austen_pride-and-prejudice.epub"
};

let rendition;

/* 📖 載入書 */
function loadBook(){
  let name = document.getElementById("bookname").value.toLowerCase();

  let url = bookDB[name];

  if(!url){
    alert("找不到這本書，請輸入：moby dick / alice / pride");
    return;
  }

  document.getElementById("viewer").innerHTML = "";

  let book = ePub(url);

  rendition = book.renderTo("viewer", {
    width:"100%",
    height:"100%"
  });

  rendition.display();
}

/* 👆 滑動翻頁（簡單版） */
document.addEventListener("click", function(e){
  if(!rendition) return;

  let x = e.clientX;
  let w = window.innerWidth;

  if(x < w/2){
    rendition.prev();
  }else{
    rendition.next();
  }
});

</script>

</body>
</html>
