
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>電子書專題 App</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  transition:0.3s;
  background:#f5f5f5;
}

/* 頂部 */
#topbar{
  padding:10px;
  text-align:center;
  background:#222;
  color:white;
}

/* 書架 */
#bookshelf{
  padding:20px;
}

.book{
  padding:15px;
  margin:10px;
  background:white;
  border-radius:10px;
  cursor:pointer;
}

/* 閱讀區 */
#viewer{
  display:none;
  height:70vh;
  padding:30px;
  background:white;
  font-size:20px;
  line-height:1.6;
}

/* 控制區 */
#controls{
  display:none;
  text-align:center;
  padding:10px;
  background:#222;
  color:white;
}

button{
  padding:10px;
  margin:5px;
}

/* 夜間模式 */
.dark{
  background:#111;
  color:white;
}

.dark #viewer{
  background:#111;
  color:white;
}

.dark .book{
  background:#333;
  color:white;
}
</style>
</head>

<body>

<div id="topbar">
📚 電子書專題 App
<button onclick="toggleDark()">🌙</button>
<button onclick="backShelf()">🏠</button>
</div>

<!-- 書架 -->
<div id="bookshelf"></div>

<!-- 閱讀區 -->
<div id="viewer"></div>

<!-- 控制 -->
<div id="controls">
  <button onclick="prev()">⬅</button>
  <button onclick="next()">➡</button>
  <button onclick="fontUp()">A+</button>
  <button onclick="fontDown()">A-</button>
  <div id="info"></div>
</div>

<script>
/* 📚 書庫 */
const books = [
  {
    title:"📘 測試書",
    pages:[
      "第1頁：你好，這是第一本書",
      "第2頁：你已經做出電子書 App",
      "第3頁：可以翻頁",
      "第4頁：還可以升級成專題"
    ]
  },
  {
    title:"📗 第二本書",
    pages:[
      "第1頁：這是第二本書",
      "第2頁：多書系統已完成",
      "第3頁：你已經在做 App 等級作品"
    ]
  }
];

let current = null;
let page = 0;
let fontSize = 20;

/* 建書架 */
function renderShelf(){
  let box = document.getElementById("bookshelf");
  box.innerHTML = "";

  books.forEach((b,i)=>{
    let div = document.createElement("div");
    div.className = "book";
    div.innerText = b.title;
    div.onclick = ()=>openBook(i);
    box.appendChild(div);
  });
}

/* 開書 */
function openBook(i){
  current = books[i];
  page = parseInt(localStorage.getItem("p_"+i)) || 0;

  document.getElementById("bookshelf").style.display="none";
  document.getElementById("viewer").style.display="block";
  document.getElementById("controls").style.display="block";

  render();
}

/* 回書架 */
function backShelf(){
  document.getElementById("bookshelf").style.display="block";
  document.getElementById("viewer").style.display="none";
  document.getElementById("controls").style.display="none";
}

/* 顯示頁 */
function render(){
  document.getElementById("viewer").style.fontSize = fontSize+"px";
  document.getElementById("viewer").innerText = current.pages[page];

  document.getElementById("info").innerText =
    `第 ${page+1} / ${current.pages.length} 頁`;

  localStorage.setItem("p_"+books.indexOf(current), page);
}

/* 翻頁 */
function next(){
  if(page < current.pages.length-1){
    page++;
    render();
  }
}

function prev(){
  if(page > 0){
    page--;
    render();
  }
}

/* 字體 */
function fontUp(){
  fontSize += 2;
  render();
}

function fontDown(){
  fontSize -= 2;
  render();
}

/* 夜間模式 */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* 初始化 */
renderShelf();
</script>

</body>
</html>
