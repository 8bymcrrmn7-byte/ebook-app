



<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>電子書閱讀器</title>

<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:white;
}

#topbar{
  padding:10px;
  text-align:center;
  background:#1e1e1e;
}

#viewer{
  height:90vh;
  background:white;
}

#footer{
  text-align:center;
  padding:10px;
  background:#1e1e1e;
}

button{
  padding:10px;
  margin:5px;
}
</style>
</head>

<body>

<div id="topbar">📖 電子書閱讀器</div>

<div id="viewer"></div>

<div id="footer">
  <button onclick="prev()">⬅</button>
  <button onclick="next()">➡</button>
</div>

<script>
const book = ePub("https://cdn.jsdelivr.net/gh/futurepress/epubjs-test-book/books/moby-dick.epub");

const rendition = book.renderTo("viewer", {
  width: "100%",
  height: "100%",
  flow: "paginated"
});

book.ready.then(() => {
  rendition.display();
});

function next(){
  rendition.next();
}

function prev(){
  rendition.prev();
}
</script>

</body>
</html>
