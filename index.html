


<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>電子書閱讀器</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:white;
}

#viewer{
  height:85vh;
  background:white;
  color:black;
  padding:30px;
  font-size:20px;
  line-height:1.6;
}

#bar{
  text-align:center;
  padding:10px;
  background:#1e1e1e;
}

button{
  padding:12px 18px;
  margin:5px;
  font-size:16px;
}
</style>
</head>

<body>

<div id="bar">
  📖 電子書閱讀器（平板穩定版）
</div>

<div id="viewer"></div>

<div id="bar">
  <button onclick="prev()">⬅ 上一頁</button>
  <button onclick="next()">下一頁 ➡</button>
  <div id="page">第 1 頁</div>
</div>

<script>
const pages = [
  "📖 第1頁：這是你的電子書閱讀器",
  "📖 第2頁：現在這個版本已經穩定",
  "📖 第3頁：不會再空白或卡住",
  "📖 第4頁：之後可以再升級 EPUB",
  "📖 第5頁：你已經成功了"
];

let i = 0;

function render(){
  document.getElementById("viewer").innerText = pages[i];
  document.getElementById("page").innerText = `第 ${i+1} / ${pages.length} 頁`;
}

function next(){
  if(i < pages.length - 1) i++;
  render();
}

function prev(){
  if(i > 0) i--;
  render();
}

render();
</script>

</body>
</html>
