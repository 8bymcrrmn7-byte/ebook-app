<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>測試翻頁</title>

<style>
body{font-family:sans-serif;margin:0;background:#111;color:white;}
#viewer{height:90vh;background:white;color:black;padding:20px;}
button{padding:10px;margin:5px;}
</style>
</head>

<body>

<div style="text-align:center;">
  <button onclick="prev()">⬅</button>
  <button onclick="next()">➡</button>
</div>

<div id="viewer"></div>

<script>
const pages = [
  "📖 第1頁：測試成功代表程式正常",
  "📖 第2頁：如果你看到這裡代表翻頁成功",
  "📖 第3頁：下一步才是 epub.js",
  "📖 第4頁：目前先排除問題",
  "📖 第5頁：OK"
];

let i = 0;

function render(){
  document.getElementById("viewer").innerText = pages[i];
}

function next(){
  if(i < pages.length - 1) i++;
  render();
}

function prev(){
  if(i > 0) i--;
  render();
}

render();
</script>

</body>
</html>
