<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>電子書 App</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  transition:0.3s;
}

/* 上方欄 */
#topbar{
  padding:10px;
  text-align:center;
  background:#1e1e1e;
  color:white;
}

/* 閱讀區 */
#viewer{
  height:75vh;
  padding:30px;
  font-size:20px;
  line-height:1.6;
  background:white;
  color:black;
  transition:0.3s;
}

/* 控制區 */
#controls{
  text-align:center;
  padding:10px;
  background:#1e1e1e;
}

/* 按鈕 */
button{
  padding:10px 15px;
  margin:5px;
}

/* 書架 */
#bookshelf{
  display:none;
  padding:20px;
}

.book{
  padding:15px;
  margin:10px;
  background:#ddd;
  cursor:pointer;
}

/* 夜間模式 */
.dark #viewer{
  background:#111;
  color:white;
}

.dark{
  background:#111;
  color:white;
}

.dark #topbar,
.dark #controls{
  background:black;
}
</style>
</head>

<body>

<div id="topbar">
📚 電子書 App
<button onclick="toggleDark()">🌙</button>
<button onclick="backToShelf()">📖 書架</button>
</div>

<!-- 書架 -->
<div id="bookshelf">
  <div class="book" onclick="openBook(0)">📘 測試書 1</div>
</div>

<!-- 閱讀區 -->
<div id="viewer"></div>

<!-- 控制 -->
<div id="controls">
  <button onclick="prev()">⬅</button>
  <button onclick="next()">➡</button>
  <div id="pageinfo"></div>
</div>

<script>
/* 書本資料 */
const books = [
  {
    title:"測試書 1",
    pages:[
      "📖 第1頁：你好，這是第一本書",
      "📖 第2頁：你已經完成電子書 App",
      "📖 第3頁：可以翻頁了",
      "📖 第4頁：還可以升級更多功能"
    ]
  }
];

let currentBook = null;
let page = 0;

/* 開書架 */
document.getElementById("bookshelf").style.display="block";
document.getElementById("viewer").style.display="none";
document.getElementById("controls").style.display="none";

/* 打開書 */
function openBook(index){
  currentBook = books[index];
  page = 0;

  document.getElementById("bookshelf").style.display="none";
  document.getElementById("viewer").style.display="block";
  document.getElementById("controls").style.display="block";

  render();
}

/* 回書架 */
function backToShelf(){
  document.getElementById("bookshelf").style.display="block";
  document.getElementById("viewer").style.display="none";
  document.getElementById("controls").style.display="none";
}

/* 顯示頁面 */
function render(){
  document.getElementById("viewer").innerText =
    currentBook.pages[page];

  document.getElementById("pageinfo").innerText =
    `第 ${page+1} / ${currentBook.pages.length} 頁`;
}

/* 翻頁 */
function next(){
  if(page < currentBook.pages.length - 1){
    page++;
    save();
    render();
  }
}

function prev(){
  if(page > 0){
    page--;
    save();
    render();
  }
}

/* 夜間模式 */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* 記錄進度 */
function save(){
  localStorage.setItem("book_progress", page);
}

/* 讀取進度 */
function load(){
  let p = localStorage.getItem("book_progress");
  if(p !== null) page = parseInt(p);
}

</script>

</body>
</html>
