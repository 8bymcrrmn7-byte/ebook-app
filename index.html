<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<script>
let book = ePub("https://cdn.jsdelivr.net/gh/futurepress/epubjs-test-book/books/moby-dick.epub");

let rendition = book.renderTo("viewer", {
  width: "100%",
  height: "100%"
});

rendition.display();

function nextPage(){
  rendition.next();
}

function prevPage(){
  rendition.prev();
}
</script>
