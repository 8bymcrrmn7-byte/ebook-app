<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>網路書城 App</title>

<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f2f2f2;
}

#topbar{
  background:#222;
  color:white;
  padding:10px;
  text-align:center;
}

#search{
  padding:10px;
  text-align:center;
}

input{
  width:70%;
  padding:10px;
}

button{
  padding:10px;
}

#grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.book{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.book img{
  width:100%;
  height:180px;
  object-fit:cover;
}

#viewer{
  display:none;
  height:80vh;
}
</style>
</head>

<body>

<div id="topbar">🌍 網路書城 App</div>

<div id="search">
  <input id="q" placeholder="輸入書名（英文效果最好）">
  <button onclick="search()">搜尋</button>
</div>

<div id="grid"></div>

<div id="viewer"></div>

<script>

let rendition;

/* 🔍 搜尋 Open Library */
async function search(){
  let q = document.getElementById("q").value;

  let res = await fetch(`https://openlibrary.org/search.json?q=${q}`);
  let data = await res.json();

  render(data.docs.slice(0,6));
}

/* 📚 顯示書 */
function render(list){
  let grid = document.getElementById("grid");
  grid.innerHTML="";

  list.forEach(book=>{
    let div = document.createElement("div");
    div.className="book";

    let cover = book.cover_i
      ? `https://covers.openlibrary.org/b/id/${book.cover_i}-L.jpg`
      : "";

    div.innerHTML = `
      <img src="${cover}">
      <p>${book.title}</p>
    `;

    div.onclick = ()=>openBook(book);

    grid.appendChild(div);
  });
}

/* 📖 開書 */
function openBook(book){

  let id = book.key.replace("/works/","");

  let url = `https://openlibrary.org/works/${id}/download.epub`;

  document.getElementById("grid").style.display="none";
  document.getElementById("search").style.display="none";
  document.getElementById("viewer").style.display="block";

  let epub = ePub(url);

  rendition = epub.renderTo("viewer",{
    width:"100%",
    height:"100%"
  });

  rendition.display();
}

</script>

</body>
</html>
