<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>電子書閱讀器</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:white;
}

#topbar{
  padding:10px;
  text-align:center;
  background:#1e1e1e;
}

#viewer{
  height:85vh;
  background:white;
  color:black;
}

#footer{
  padding:10px;
  text-align:center;
  background:#1e1e1e;
}

button{
  padding:8px 15px;
  margin:5px;
}

#progress{
  width:80%;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
</head>

<body>

<div id="topbar">
  📖 <span id="title">電子書閱讀器</span>
</div>

<div id="viewer"></div>

<div id="footer">
  <button onclick="prev()">⬅</button>
  <button onclick="next()">➡</button>
  <br>

  📊 <progress id="progress" value="0" max="100"></progress>
  <div id="pageinfo">第 1 頁</div>
</div>

<script>
const book = ePub("https://cdn.jsdelivr.net/gh/futurepress/epubjs-test-book/books/moby-dick.epub");

const rendition = book.renderTo("viewer", {
  width: "100%",
  height: "100%",
  flow: "paginated"
});

let currentLocation;

book.ready.then(() => {
  rendition.display();

  book.locations.generate(100).then(() => {
    updateProgress();
  });
});

rendition.on("relocated", (location) => {
  currentLocation = location;
  updateProgress();
});

function updateProgress(){
  if (!book.locations) return;

  const percentage = book.locations.percentageFromCfi(currentLocation?.start.cfi || 0);
  document.getElementById("progress").value = percentage * 100;

  const current = book.locations.locationFromCfi(currentLocation?.start.cfi || 0);
  document.getElementById("pageinfo").innerText = `閱讀進度 ${Math.floor(percentage*100)}%`;
}

function next(){
  rendition.next();
}

function prev(){
  rendition.prev();
}
</script>

</body>
</html>
